<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pizzería Don Carlos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>


<body>

    <div class="carrito-icono" onclick="abrirCarrito()">
        🛒 <span id="contadorCarrito">0</span>
    </div>

    <div id="loader">
        <div class="loader-content">
            <img src="img/Logo Pizza.jpg" class="logo">
            <h2>Pizzería Don Carlos</h2>
        </div>
    </div>

<section class="hero">

    <div class="hero-texto">
        <h1>Pizzería Don Carlos</h1>
        <p>Las mejores pizzas artesanales 🍕</p>

        <a href="#menu" class="btn-menu">Ver Menú</a>
    </div>

</section>

<main id="menu">

    <h2>Nuestras Pizzas</h2>

    <div class="menu">

        <div class="pizza-card" onclick="mostrarPizza('pepperoni')">
            <img src="img/Pizza pepperoni.jpeg" alt="Pepperoni">
            <h3>Pizza Pepperoni</h3>
        </div>

        <div class="pizza-card" onclick="mostrarPizza('hawaiana')">
            <img src="img/Pizza Hawaina.jpeg" alt="Hawaiana">
            <h3>Pizza Hawaiana</h3>
        </div>

        <div class="pizza-card" onclick="mostrarPizza('margarita')">
            <img src="img/Pizza Margarita.jpeg" alt="Margarita">
            <h3>Pizza Margarita</h3>
        </div>

        <div class="pizza-card" onclick="mostrarPizza('polloChampi')">
            <img src="img/Pizza Pollo con champiñon.jpeg">
            <h3>Pizza Pollo con champiñon</h3>
        </div>

        <div class="pizza-card" onclick="mostrarPizza('cuatroQuesos')">
            <img src="img/Pizza de pollo salsa BBQ.jpg">
            <h3>Pizza Cuatro Quesos</h3>
        </div>

        <div class="pizza-card" onclick="mostrarPizza('vegetariana')">
            <img src="img/Pizzavegetariana.jpg">
            <h3>Pizza Vegetariana</h3>
        </div>

    </div>

</main>

<!-- Ventana de detalle -->
<div id="detallePizza" class="detalle oculto">
    <div class="contenido">
        <span class="cerrar" onclick="cerrarDetalle()">X</span>

        <h2 id="tituloPizza"></h2>

        <img id="imagenPizza">

        <p id="descripcionPizza"></p>

        <div id="precioPizza"></div>

        <button class="btn-comprar" onclick="comprarPizza()">Agregar al carrito</button>
    </div>
</div>

<div id="modalCarrito" class="detalle oculto">
    <div class="contenido">
        <span class="cerrar" onclick="cerrarCarrito()">X</span>
            <h2>🛒 Tu carrito</h2>
        <div id="listaCarrito"></div>
        <button class="btn-pedido" onclick="hacerPedido()"> Hacer pedido </button>
    </div>
</div>

<div id="modalRecibo" class="detalle oculto">

    <div class="contenido">

        <span class="cerrar" onclick="cerrarRecibo()">X</span>

        <h2>🧾 Recibo de compra</h2>
        <p id="fechaPedido"></p>
        <p id="numeroPedido"></p>
        <div id="detalleRecibo"></div>
        <h3 id="totalRecibo"></h3>

    </div>

</div>

<script src="script.js"></script>
<div id="toast" class="toast oculto"></div>

<div class="whatsapp">
    <img src="img/Whattsap.png" alt="WhatsApp">
</div>
</body>
</html>
